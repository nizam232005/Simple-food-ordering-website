{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hover-scale:hover {
            transform: scale(1.02);
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-lg fade-in">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">✏️ Edit Product</h1>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <!-- Name -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Product Name</label>
                <input type="text" name="name" value="{{ product.name }}"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none" required>
            </div>

            <!-- Price -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Price</label>
                <input type="number" name="price" value="{{ product.price }}"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none" required>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Description</label>
                <textarea name="description" rows="4"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">{{ product.description }}</textarea>
            </div>

            <!-- Status -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Status</label>
                <select name="status"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    {% for value, label in product.STATUS_CHOICES %}
                        <option value="{{ value }}" {% if product.status == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Current Image -->
            {% if product.image %}
            <div class="text-center">
                <p class="text-gray-600 mb-2">Current Image:</p>
                <img src="{{ product.image.url }}" alt="Product Image"
                    class="w-32 h-32 object-contain mx-auto border rounded-lg hover-scale">
            </div>
            {% endif %}

            <!-- Upload New Image -->
            <div>
                <label class="block text-gray-700 font-medium mb-2">Change Image</label>
                <input type="file" name="image"
                    class="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none">
            </div>

            <!-- Submit Button -->
            <div class="text-center">
                <button type="submit"
                    class="px-6 py-3 bg-blue-500 text-white font-semibold rounded-lg shadow-md hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-300 transition duration-300">
                    💾 Save Changes
                </button>
            </div>
        </form>
    </div>

</body>
</html>
