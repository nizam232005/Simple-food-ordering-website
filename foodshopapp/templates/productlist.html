={% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin - Product List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f9f9f9;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .product-info {
            padding: 15px;
            flex-grow: 1;
        }
        .product-info h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: #2c3e50;
        }
        .price {
            font-size: 16px;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 8px;
        }
        .description {
            font-size: 14px;
            color: #7f8c8d;
            height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .status {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 12px;
            margin-top: 10px;
            font-weight: bold;
        }
        .status.available {
            background: #e9f9ee;
            color: #27ae60;
        }
        .status.unavailable {
            background: #fdecea;
            color: #e74c3c;
        }
        .status.comingsoon {
            background: #fff4e5;
            color: #e67e22;
        }

        /* Buttons */
        .button-group {
            display: flex;
            justify-content: space-around;
            padding: 10px 15px 15px;
            gap: 8px;
        }
        .btn {
            flex: 1;
            text-align: center;
            padding: 8px 10px;
            font-size: 14px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
            transition: background 0.2s ease;
        }
        .btn-edit {
            background: #3498db;
        }
        .btn-edit:hover {
            background: #2980b9;
        }
        .btn-delete {
            background: #e74c3c;
        }
        .btn-delete:hover {
            background: #c0392b;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            font-size: 14px;
            background: #2c3e50;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s ease;
        }
        .btn-back:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

<h1>Product Management - Admin View</h1>

<!-- Back button -->
<div style="margin-bottom: 20px; text-align: center;">
    <a href="{% url 'adminhome' %}" class="btn-back">← Back to Admin Dashboard</a>
</div>

<div class="product-grid">
    {% for product in c %}
    <div class="product-card">
        {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
        {% else %}
            <img src="https://via.placeholder.com/200x200?text=No+Image" alt="No Image">
        {% endif %}
        <div class="product-info">
            <h3>{{ product.name }}</h3>
            <div class="price">₹{{ product.price }}</div>
            <div class="description">{{ product.description }}</div>
            <span class="status 
                {% if product.status == 'Available' %}available{% elif product.status == 'Unavailable' %}unavailable{% else %}comingsoon{% endif %}">
                {{ product.status }}
            </span>
        </div>
        <div class="button-group">
            <a href="{% url 'editproduct' product.id %}" class="btn btn-edit">Edit</a>
            <a href="{% url 'deleteproduct' product.id %}" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this product?');">Delete</a>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
