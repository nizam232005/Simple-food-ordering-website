<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Transparent Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Slight dark overlay for better text readability */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
        }

        .login-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 30px 40px;
            width: 350px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            color: white;
            animation: fadeIn 1s ease-out forwards, floatUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: white;
            letter-spacing: 1px;
        }

        .login-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #fff;
        }

        .login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .login-container input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 8px #f39c12;
        }

        .login-container button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s;
        }

        .login-container button:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #e67e22, #d35400);
        }

        .login-container p {
            text-align: center;
            margin-top: 15px;
            color: #ddd;
        }

        .login-container a {
            color: #f39c12;
            text-decoration: none;
        }

        .login-container a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes floatUp {
            from { transform: translateY(30px); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Welcome Back</h2>
        <form action="#" method="post">
            {% csrf_token %}
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#">Register</a></p>
    </div>
</body>
</html>
