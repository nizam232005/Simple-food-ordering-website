{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(270deg, #f8f9fa, #e3f2fd, #f1f8e9, #fff3e0);
        background-size: 600% 600%;
        animation: smoothGradient 20s ease infinite;
    }

    @keyframes smoothGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .form-container {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(20px);
        padding: 30px 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 450px;
        color: #333;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        animation: fadeIn 1.2s ease;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: bold;
        letter-spacing: 1px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        font-size: 14px;
    }

    input, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        margin-bottom: 15px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
    }

    input[type="file"] {
        padding: 5px;
        background: rgba(255, 255, 255, 0.9);
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(90deg, #a1c4fd, #c2e9fb);
        color: #333;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
</style>


</head>
<body>
    <form class="form-container" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <h2>Edit Profile</h2>

        <label>Name</label>
        <input type="text" name="name" value="{{ c.name }}" required>

        <label>Age</label>
        <input type="number" name="age" value="{{ c.age }}" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="M" {% if c.gender == 'M' %}selected{% endif %}>Male</option>
            <option value="F" {% if c.gender == 'F' %}selected{% endif %}>Female</option>
            <option value="O" {% if c.gender == 'O' %}selected{% endif %}>Other</option>
        </select>

        <label>Email</label>
        <input type="email" name="email" value="{{ c.email }}" required>

        <label>Address</label>
        <input type="text" name="address" value="{{ c.address }}" required>

        <label>Profile Image</label>
        <input type="file" name="image">

        <label>Password</label>
        <input type="password" name="password" value="{{ c.password }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ c.phone }}" required>

        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
